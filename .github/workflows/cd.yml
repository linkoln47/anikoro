name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "back/**"
      - "front/**"
      - "docker-compose.yml"
      - "deploy-anikoro"
      - "!back/**/*_test.go"
      - "!front/**/*.test.*"
      - "!front/**/*.spec.*"
      - "!front/**/__tests__/**"
      - "!back/**/*.md"
      - "!front/**/*.md"

permissions:
  contents: read

env:
  BACKEND_IMAGE: ghcr.io/linkoln47/anikoro-backend
  FRONTEND_IMAGE: ghcr.io/linkoln47/anikoro-frontend

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build-images:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:main

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:main

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: prod
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          ANIKORO_SSH_KEY: ${{ secrets.ANIKORO_SSH_KEY }}
          ANIKORO_HOST: ${{ secrets.ANIKORO_HOST }}
          ANIKORO_PORT: ${{ secrets.ANIKORO_PORT }}
          ANIKORO_HOST_KEY_SHA256: SHA256:76L7ivRrSnXfuhW8QEx5NI8I4g79OBXHnCTFvaVUWPI
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh

          printf '%s\n' "$ANIKORO_SSH_KEY" > ~/.ssh/anikoro
          chmod 600 ~/.ssh/anikoro

          ssh-keyscan -t ed25519 -p "$ANIKORO_PORT" "$ANIKORO_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh-keygen -lf ~/.ssh/known_hosts -E sha256
          ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | grep -F "$ANIKORO_HOST_KEY_SHA256"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/anikoro \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -p "${{ secrets.ANIKORO_PORT }}" \
              "${{ secrets.ANIKORO_USER }}@${{ secrets.ANIKORO_HOST }}" \
              "sudo -n /srv/anikoro/deploy-anikoro \
                ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }} \
                ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}"
