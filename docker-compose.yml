services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./back/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-anikoro-backend:local}
    build:
      context: ./back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      MAL_CLIENT_ID: ${MAL_CLIENT_ID:?Set MAL_CLIENT_ID in .env}
      MAL_CLIENT_SECRET: ${MAL_CLIENT_SECRET:-}
      MAL_REDIRECT_URI: ${MAL_REDIRECT_URI:?Set MAL_REDIRECT_URI in .env}
      MAL_FRONTEND_URL: ${MAL_FRONTEND_URL:?Set MAL_FRONTEND_URL in .env}
      MAL_SESSION_SECRET: ${MAL_SESSION_SECRET:?Set MAL_SESSION_SECRET in .env}
      PORT: 8080
      MAL_DATA_DIR: /data
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - backend-data:/data
    expose:
      - "8080"

  frontend:
    image: ${FRONTEND_IMAGE:-anikoro-frontend:local}
    build:
      context: ./front
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${HTTP_PORT:-8081}:80"

volumes:
  postgres-data:
  backend-data:

