services:
  migrate:
    image: ${BACKEND_IMAGE:-anikoro-backend:local}
    build:
      context: ./back
    restart: "no"
    entrypoint: ["migrate", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    image: ${BACKEND_IMAGE:-anikoro-backend:local}
    build:
      context: ./back
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      MAL_CLIENT_ID: ${MAL_CLIENT_ID:?Set MAL_CLIENT_ID in .env}
      MAL_CLIENT_SECRET: ${MAL_CLIENT_SECRET:-}
      MAL_REDIRECT_URI: ${MAL_REDIRECT_URI:?Set MAL_REDIRECT_URI in .env}
      MAL_FRONTEND_URL: ${MAL_FRONTEND_URL:?Set MAL_FRONTEND_URL in .env}
      MAL_SESSION_SECRET: ${MAL_SESSION_SECRET:?Set MAL_SESSION_SECRET in .env}
      PORT: 8080
      MAL_DATA_DIR: /data
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - backend-data:/data
    expose:
      - "8080"

  # Cold-path catalog worker: hydrates the resolved=false stubs the lightweight
  # user sync leaves behind (details + franchise rebuild) and refreshes stale
  # community mal_score. Shares the backend-data volume for its details staging
  # cache and 404 quarantine; the API server no longer writes there.
  lazy-worker:
    image: ${BACKEND_IMAGE:-anikoro-backend:local}
    build:
      context: ./back
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint: ["lazy-worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      MAL_CLIENT_ID: ${MAL_CLIENT_ID:?Set MAL_CLIENT_ID in .env}
      MAL_DATA_DIR: /data
      LAZY_WORKER_INTERVAL: ${LAZY_WORKER_INTERVAL:-1m}
      LAZY_WORKER_BATCH_SIZE: ${LAZY_WORKER_BATCH_SIZE:-200}
      LAZY_WORKER_TTL: ${LAZY_WORKER_TTL:-168h}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-data:/data

  frontend:
    image: ${FRONTEND_IMAGE:-anikoro-frontend:local}
    build:
      context: ./front
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${HTTP_PORT:-8081}:80"

volumes:
  backend-data:
